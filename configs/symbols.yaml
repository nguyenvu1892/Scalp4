# ============================================================
# SCALFOREX — SYMBOLS CONFIG
# 5 symbols trên sàn Exness
# ============================================================

symbols:
  XAUUSD:
    type: "commodity"
    pip_size: 0.01                   # 1 pip = 0.01 cho Gold
    pip_value_per_lot: 1.0           # $1 per pip per 0.01 lot
    min_lot: 0.01
    max_lot: 1.0
    lot_step: 0.01
    avg_spread_pips: 20              # ~20 pips average spread on Exness
    sessions: ["asian", "european", "us"]
    is_crypto: false

  ETHUSD:
    type: "crypto"
    pip_size: 0.01
    pip_value_per_lot: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    avg_spread_pips: 50
    sessions: ["24/7"]
    is_crypto: true

  BTCUSD:
    type: "crypto"
    pip_size: 0.01
    pip_value_per_lot: 0.01
    min_lot: 0.01
    max_lot: 5.0
    lot_step: 0.01
    avg_spread_pips: 100
    sessions: ["24/7"]
    is_crypto: true

  US30:
    type: "index"
    pip_size: 0.01
    pip_value_per_lot: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    avg_spread_pips: 30
    sessions: ["asian", "european", "us"]
    is_crypto: false

  USTEC:
    type: "index"
    pip_size: 0.01
    pip_value_per_lot: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    avg_spread_pips: 25
    sessions: ["asian", "european", "us"]
    is_crypto: false

# Timeframes
timeframes:
  primary: "M5"
  secondary: "M15"
  context:
    - "H1"
    - "H4"

# Feature pipeline — ZERO HARDCODE: all params here
features:
  lookback_window: 60                # 60 bars = 5 hours (M5)
  total_features: 29
  normalize: true                    # Welford's running normalizer
  clip_range: 5.0                    # Normalizer z-score clip

  # Rolling window sizes
  volume_rolling_window: 20          # SMA window cho relative_volume
  swing_lookback: 10                 # Rolling window cho trend_direction
  liquidity_window: 20               # Rolling window cho liquidity pools

  # Thresholds
  climax_volume_threshold: 2.5       # volume > N× average = climax
  pin_bar_wick_ratio: 2.0            # wick > N× body = pin bar

  # Session hours (UTC)
  sessions:
    asian_start: 0
    asian_end: 8
    european_start: 8
    european_end: 15
    us_start: 15
    us_end: 22

