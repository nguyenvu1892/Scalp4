# ============================================================
# SCALFOREX — TRAINING CONFIG
# SAC hyperparameters, curriculum, reward weights
# ============================================================

sac:
  learning_rate: 3.0e-4
  buffer_size: 500000
  batch_size: 256
  gamma: 0.99                        # Discount factor
  tau: 0.005                         # Soft update coefficient
  ent_coef: "auto"                   # Automatic entropy tuning
  target_entropy: "auto"

  # Network architecture
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]

  # Action space (Phase 1: 2D — mapped from [-1,1])
  action_dim: 2                      # [direction_confidence, risk_fraction]
  action_bounds:
    direction: [-1.0, 1.0]           # <-0.3 SELL, >0.3 BUY, else HOLD
    risk_fraction: [-1.0, 1.0]       # Mapped to [0, 1] via (x+1)/2

# Transformer encoder
transformer:
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  max_sequence_length: 60            # = lookback_window

# Cross-Attention (Multi-TF)
cross_attention:
  d_model: 64
  nhead: 4
  context_window: 24                 # 24 bars H1 = 24h context
  use_causal_mask: true              # Chống look-ahead bias

# Regime detector
regime:
  hidden_dim: 64
  num_regimes: 3                     # trending, ranging, volatile
  learnable: true                    # End-to-end trainable (not HMM)

# Curriculum stages
curriculum:
  stages:
    - name: "kindergarten"
      steps: 50000
      max_dd_pct: 0.80
      spread_mode: "fixed"
      regimes: ["trending"]

    - name: "elementary"
      steps: 150000
      max_dd_pct: 0.60
      spread_mode: "variable"
      regimes: ["trending", "ranging"]

    - name: "highschool"
      steps: 300000
      max_dd_pct: 0.50
      spread_mode: "realistic"
      regimes: ["trending", "ranging", "volatile"]

    - name: "university"
      steps: 500000
      max_dd_pct: 0.50
      spread_mode: "realistic"
      regimes: ["all"]
      use_augmentation: true

# Reward configuration — Baseline weights from Tech Lead (Gem)
reward:
  # Scalp timing
  scalp_bonus_fast: 0.5              # Close < 6 bars (30 min) with profit
  scalp_bonus_medium: 0.2            # Close < 30 bars (2.5h) with profit
  max_trades_per_day: 10

  # Reward weights (w_*)
  w_pnl: 1.0                        # Realized PnL giữ nguyên
  w_shaping: 0.05                    # Unrealized PnL dẫn đường nhẹ
  w_scalp_bonus: 1.0                 # Thưởng đóng lệnh nhanh có lời
  w_rr_bonus: 0.8                    # Risk/Reward (0.8 chống gồng lời quá mức)
  w_cost: 1.5                        # ×1.5 chi phí thật — ép setup nét với $200
  w_hold_penalty: 1.2                # ×1.2 phạt ôm lệnh (chống swing trading)
  w_overtrade: 2.0                   # ×2 phạt spam lệnh — kỷ luật cực gắt

  # Drawdown penalty (exponential)
  dd_penalty_alpha: 1.0              # Hệ số gốc hàm mũ
  dd_penalty_beta: 5.0               # DD sát 50% → điểm trừ bùng nổ

# Training
training:
  total_steps: 1000000
  eval_freq: 10000
  save_freq: 50000
  log_to_wandb: true
  seed: 42
  device: "auto"                     # auto-detect GPU/CPU
